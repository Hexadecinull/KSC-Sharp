name: Manual Release

# Split into small, independently re-runnable jobs on purpose: a single all-in-one job means
# a failure in, say, checksum generation forces re-running the entire build + Inno Setup
# install + tests from scratch. Here, "Re-run failed jobs" in the Actions UI only re-runs the
# part that actually broke.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number, e.g. 1.2.0 (no leading "v", no suffix)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        type: choice
        default: release
        options:
          - release
          - pre-release
          - beta
          - alpha
          - experimental
      changelog:
        description: >-
          Changelog highlight (optional). GitHub's "Run workflow" web form only allows a
          single line here - for real multi-line notes, trigger via `gh workflow run
          manual-release.yml -f changelog="$(cat notes.md)"` or the API instead. Either way, a
          commit list since the last tag is appended automatically below whatever's typed here.
        required: false
        type: string
      draft:
        description: 'Create as a draft (review before publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Validate version format
        id: check
        run: |
          version="${{ inputs.version }}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$version' doesn't look like X.Y.Z (e.g. 1.2.0). Got: '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore KSC-Sharp.sln

      - name: Build
        run: dotnet build KSC-Sharp.sln --configuration Release --no-restore -p:Version=${{ needs.validate.outputs.version }}

      - name: Test
        run: dotnet test tests/KoroneStrap.Core.Tests/KoroneStrap.Core.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish app (${{ matrix.rid }})
        run: dotnet publish src/KSC-Sharp.App/KSC-Sharp.App.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o publish -p:Version=${{ needs.validate.outputs.version }}

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.rid }}
          path: publish/
          if-no-files-found: error
          retention-days: 3

  installer:
    needs: [validate, build]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            arch: x64
          - rid: win-x86
            arch: x86
    steps:
      - uses: actions/checkout@v6

      - name: Download ${{ matrix.rid }} build
        uses: actions/download-artifact@v8
        with:
          name: build-${{ matrix.rid }}
          path: dist/${{ matrix.rid }}

      # windows-latest's image doesn't ship Inno Setup by default (dropped when the image
      # moved to Windows Server 2025) - install it explicitly rather than assume ISCC.exe is
      # already on PATH.
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ needs.validate.outputs.version }} /DMyAppArch=${{ matrix.arch }} /DMySourceDir=..\..\dist\${{ matrix.rid }} installer\Inno\installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.rid }}
          path: installer/Inno/Output/*.exe
          if-no-files-found: error
          retention-days: 3

  release:
    needs: [validate, build, installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all builds
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package portable builds and checksums
        run: |
          mkdir -p dist
          for rid in linux-x64 win-x64 win-x86 osx-arm64; do
            (cd "artifacts/build-$rid" && zip -qr "../../dist/KSC-Sharp-${{ needs.validate.outputs.version }}-$rid.zip" .)
          done
          for rid in win-x64 win-x86; do
            cp artifacts/installer-$rid/*.exe "dist/"
          done
          (cd dist && sha256sum * > checksums.sha256.txt)
          ls -la dist

      - name: Build release notes
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$last_tag" ]; then
            commits=$(git log "$last_tag..HEAD" --pretty=format:"- %s (%h)")
          else
            commits=$(git log --pretty=format:"- %s (%h)")
          fi
          [ -z "$commits" ] && commits="- No commits since the last tag."

          {
            manual="${{ inputs.changelog }}"
            if [ -n "$manual" ]; then
              echo "$manual"
              echo ""
            fi
            echo "### Commits since last release"
            echo "$commits"
          } > release-notes.md

      - name: Resolve release metadata
        id: meta
        run: |
          type="${{ inputs.release_type }}"
          case "$type" in
            release)      label="" ;;
            pre-release)  label=" (Pre-release)" ;;
            beta)         label=" (Beta)" ;;
            alpha)        label=" (Alpha)" ;;
            experimental) label=" (Experimental)" ;;
            *)            label="" ;;
          esac

          if [ "$type" = "release" ]; then prerelease_flag=""; else prerelease_flag="--prerelease"; fi

          echo "title=KSC-Sharp v${{ needs.validate.outputs.version }}$label" >> "$GITHUB_OUTPUT"
          echo "prerelease_flag=$prerelease_flag" >> "$GITHUB_OUTPUT"

      # Uses the GitHub CLI (preinstalled on every hosted runner, first-party maintained)
      # directly instead of a third-party action, wrapped in a retry loop. This is a direct
      # response to a real failure seen here: GitHub's API returned a transient 500 ("Unicorn"
      # error page) partway through a release run. gh CLI gives full control over retry
      # behavior instead of depending on whether the community action retries internally.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="v${{ needs.validate.outputs.version }}"

          draft_flag=""
          if [ "${{ inputs.draft }}" = "true" ]; then draft_flag="--draft"; fi

          attempt=1
          max_attempts=3
          until gh release create "$tag" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md \
            ${{ steps.meta.outputs.prerelease_flag }} \
            $draft_flag \
            dist/*.zip dist/*.exe dist/checksums.sha256.txt
          do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::gh release create failed after $max_attempts attempts."
              exit 1
            fi
            echo "Release creation failed (attempt $attempt/$max_attempts) - this is usually a transient GitHub API error. Retrying in 15s..."
            attempt=$((attempt + 1))
            sleep 15
          done
