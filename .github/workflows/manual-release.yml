name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version file
        run: echo "${{ inputs.version }}" > VERSION.txt

      - name: Restore
        run: dotnet restore KSC-Sharp.sln

      - name: Build solution
        run: dotnet build KSC-Sharp.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/KoroneStrap.Core.Tests/KoroneStrap.Core.Tests.csproj --configuration Release --verbosity normal

      - name: Publish app (Windows)
        run: dotnet publish src/KSC-Sharp.App/KSC-Sharp.App.csproj -c Release -r win-x64 --self-contained false -o dist/win

      - name: Package ZIP
        run: powershell Compress-Archive -Path dist/win/* -DestinationPath dist/KSC-Sharp-${{ inputs.version }}-win-x64.zip

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-FileHash dist/KSC-Sharp-${{ inputs.version }}-win-x64.zip -Algorithm SHA256 | Format-List > dist/KSC-Sharp-${{ inputs.version }}-win-x64.sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: KSC-Sharp v${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/KSC-Sharp-${{ inputs.version }}-win-x64.zip
            dist/KSC-Sharp-${{ inputs.version }}-win-x64.sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
