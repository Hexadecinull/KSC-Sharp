name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore KSC-Sharp.sln

      - name: Build
        run: dotnet build KSC-Sharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/KoroneStrap.Core.Tests/KoroneStrap.Core.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish app (${{ matrix.rid }})
        run: dotnet publish src/KSC-Sharp.App/KSC-Sharp.App.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o publish

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: KSC-Sharp-${{ matrix.rid }}
          path: publish/
          if-no-files-found: error
          retention-days: 14
