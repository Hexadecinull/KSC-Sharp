name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore KSC-Sharp.sln

      - name: Build
        run: dotnet build KSC-Sharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/KoroneStrap.Core.Tests/KoroneStrap.Core.Tests.csproj --configuration Release --no-build --verbosity normal
